# Production overlay: docker compose -f docker-compose.db.yml -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Adds Caddy (TLS on :443). App and db stay on the internal Docker network only.

services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
